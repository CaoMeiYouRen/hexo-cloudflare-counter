name = "hexo-cloudflare-counter"
# 默认为 Production 环境
main = "dist/cloudflare-workers.mjs"
minify = true
compatibility_date = "2024-10-20"
compatibility_flags = ["nodejs_compat"]
assets = { directory = "public" }

[vars]
# X-LC-Sign 允许的最大时间偏移窗口(ms)
SIGN_MAX_AGE_MS = 300000
# 写接口基础限流与短时去重
RATE_LIMIT_MAX_WRITES = 60
RATE_LIMIT_WINDOW_MS = 60000
DEDUPE_WINDOW_MS = 15000
# 超时时间(ms)
TIMEOUT = 60000
# 最大请求体大小(字节)，默认 1 MiB
MAX_BODY_SIZE = 1048576

# 请替换为你自己设置的环境变量值
# APP_ID = "your-app-id"

# APP_KEY = "your-app-key"

# 默认 CORS 放开；如果需要限制来源，再显式配置白名单
# CORS_ALLOW_ORIGINS = "https://blog.example.com"

[[d1_databases]]
binding = "COUNTER_DB"
database_name = "hexo-cloudflare-counter"
# 请替换为你的 D1 数据库 ID，可以在 Cloudflare Dashboard 的 D1 数据库详情页找到
database_id = "d21d93d2-f122-4ad9-b2b0-cea4c37165d1"

[env.dev]
# Development 环境配置
main = "apps/server/src/cloudflare-workers.ts"
minify = false
assets = { directory = "public" }

[observability]
enabled = true
head_sampling_rate = 1 # optional. default = 1.
